<style>
:root, [data-theme="dark"] {
  --bg-base: #0C0508;
  --surface: #130810;
  --maroon: #C41E30;
  --maroon-deep: #7A0E1A;
  --gold: #D4AF37;
  --text-primary: #F2EBF0;
  --text-secondary: #A89AA5;
  --text-muted: #6B5E68;
  --border: rgba(255,255,255,0.07);
}

[data-theme="light"] {
  --bg-base: #F8F4F6;
  --surface: #FFFFFF;
  --text-primary: #1A0810;
  --text-secondary: #4A2D3C;
  --text-muted: #8A6878;
  --border: rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { height: 100%; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  transition: background 300ms, color 300ms;

/* ═══════════════════════════════════════════════════════ SPLASH SCREEN */

.splash-container {
  display: flex;
  height: 100vh;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0C0508 0%, #1A0C15 100%);
  flex-direction: column;
  gap: 30px;
  perspective: 1200px;
}

.logo-wrapper {
  width: 220px;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.logo-3d {
  width: 100%;
  height: 100%;
  animation: float3d 4s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.6)) drop-shadow(0 0 50px rgba(196, 30, 48, 0.4));
}

@keyframes float3d {
  0% {
    transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateY(0px);
  }
  25% {
    transform: rotateX(15deg) rotateY(90deg) rotateZ(10deg) translateY(-10px);
  }
  50% {
    transform: rotateX(30deg) rotateY(180deg) rotateZ(20deg) translateY(0px);
  }
  75% {
    transform: rotateX(15deg) rotateY(270deg) rotateZ(10deg) translateY(-10px);
  }
  100% {
    transform: rotateX(0deg) rotateY(360deg) rotateZ(0deg) translateY(0px);
  }
}

.splash-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 56px;
  font-weight: 700;
  color: #F2EBF0;
  letter-spacing: 2px;
  animation: fadeInUp 0.8s ease-out 0.3s both;
}

.splash-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  color: #D4AF37;
  letter-spacing: 3px;
  animation: fadeInUp 0.8s ease-out 0.5s both;
}

.splash-desc {
  color: #A89AA5;
  font-size: 13px;
  text-align: center;
  animation: fadeInUp 0.8s ease-out 0.7s both;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════ LOGIN SCREEN */

.login-container {
  display: flex;
  height: 100vh;
  background: linear-gradient(135deg, #0C0508 0%, #1A0C15 100%);
}

.login-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

.logo-badge {
  width: 160px;
  height: 160px;
  margin-bottom: 50px;
  filter: drop-shadow(0 15px 40px rgba(196, 30, 48, 0.5));
  animation: fadeInUp 0.8s ease-out both;
}

.login-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px;
  font-weight: 700;
  color: #F2EBF0;
  margin-bottom: 10px;
  animation: fadeInUp 0.8s ease-out 0.2s both;
}

.login-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  color: #D4AF37;
  margin-bottom: 30px;
  animation: fadeInUp 0.8s ease-out 0.4s both;
}

.login-desc {
  color: #A89AA5;
  text-align: center;
  font-size: 13px;
  animation: fadeInUp 0.8s ease-out 0.6s both;
}

.login-right {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

.login-card {
  background: rgba(26, 12, 21, 0.95);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(196, 30, 48, 0.3);
  border-radius: 24px;
  padding: 50px 40px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
  animation: fadeInUp 0.8s ease-out 0.3s both;
}

.card-header {
  margin-bottom: 30px;
}

.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 700;
  color: #D4AF37;
  margin-bottom: 8px;
}

.card-subtitle {
  color: #A89AA5;
  font-size: 13px;
}

.form-group {
  margin-bottom: 22px;
}

.form-label {
  display: block;
  color: #6B5E68;
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-input {
  width: 100%;
  padding: 13px 16px;
  background: rgba(255, 255, 255, 0.042);
  border: 1px solid rgba(255, 255, 255, 0.07);
  border-radius: 10px;
  color: #F2EBF0;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  transition: all 200ms ease;
}

.form-input:focus {
  outline: none;
  border-color: #C41E30;
  background: rgba(255, 255, 255, 0.08);
  box-shadow: 0 0 0 3px rgba(196, 30, 48, 0.15);
}

.form-input::placeholder {
  color: #6B5E68;
}

.submit-btn {
  width: 100%;
  padding: 13px 20px;
  background: linear-gradient(135deg, #C41E30 0%, #7A0E1A 100%);
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 200ms ease;
  margin-top: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(196, 30, 48, 0.4);
}

.submit-btn:active {
  transform: translateY(0px);
}

.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.error-alert {
  background: rgba(239, 68, 68, 0.12);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 10px;
  color: #f87171;
  padding: 12px 14px;
  font-size: 12px;
  margin-bottom: 20px;
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.login-footer {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid rgba(255, 255, 255, 0.07);
  text-align: center;
  color: #6B5E68;
  font-size: 10px;
}

/* ═══════════════════════════════════════════════════════ UTILITY */

.loading-spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(212, 175, 55, 0.3);
  border-top: 2px solid #D4AF37;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@media (max-width: 768px) {
  .login-container {
    flex-direction: column;
  }
  .login-left, .login-right {
    flex: 1;
  }
  .splash-text {
    font-size: 42px;
  }
  .splash-sub {
    font-size: 28px;
  }
  .login-card {
    width: 90%;
    padding: 40px 30px;
  }
}

/* ═══════════════════════════════════════════════════════ PHASE 2: DASHBOARD */

.app-layout {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 20px;
  overflow-y: auto;
  transition: all 300ms ease;
}

.sidebar-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 30px;
  text-align: center;
  letter-spacing: 1px;
}

.nav-group {
  margin-bottom: 30px;
}

.nav-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-left: 12px;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}

.nav-btn {
  width: 100%;
  padding: 12px 16px;
  background: transparent;
  border: none;
  border-radius: 10px;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 150ms ease;
  text-align: left;
  margin-bottom: 6px;
}

.nav-btn:hover {
  background: rgba(196, 30, 48, 0.1);
  color: var(--text-primary);
}

.nav-btn.active {
  background: linear-gradient(135deg, rgba(196, 30, 48, 0.3), rgba(196, 30, 48, 0.1));
  color: var(--gold);
  border-left: 3px solid var(--maroon);
  font-weight: 600;
}

.sidebar-footer {
  margin-top: auto;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.user-card {
  background: rgba(196, 30, 48, 0.1);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  font-size: 12px;
}

.user-name {
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.user-role {
  color: var(--text-muted);
  font-size: 11px;
}

.logout-btn {
  width: 100%;
  padding: 10px;
  background: rgba(196, 30, 48, 0.2);
  border: 1px solid rgba(196, 30, 48, 0.3);
  border-radius: 8px;
  color: var(--maroon);
  font-weight: 600;
  font-size: 12px;
  cursor: pointer;
  transition: all 150ms ease;
  margin-top: 10px;
}

.logout-btn:hover {
  background: rgba(196, 30, 48, 0.3);
  border-color: var(--maroon);
}

.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.topbar {
  height: 60px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
}

.topbar-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--text-primary);
}

.topbar-actions {
  display: flex;
  gap: 12px;
}

.action-btn {
  padding: 8px 16px;
  background: rgba(196, 30, 48, 0.15);
  border: 1px solid rgba(196, 30, 48, 0.3);
  border-radius: 8px;
  color: var(--maroon);
  font-weight: 600;
  font-size: 12px;
  cursor: pointer;
  transition: all 150ms ease;
}

.action-btn:hover {
  background: var(--maroon);
  color: white;
  border-color: var(--maroon);
}

.content-panel {
  flex: 1;
  overflow-y: auto;
  padding: 30px;
}

.section-header {
  margin-bottom: 30px;
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.section-date {
  color: var(--text-secondary);
  font-size: 13px;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.stat-box {
  background: linear-gradient(135deg, var(--surface) 0%, rgba(0,0,0,0.1) 100%);

.stat-icon {

.stat-value {

  font-size: 36px;

  margin: 8px 0;
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.chart-grid {

  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 20px;
  margin-bottom: 30px;

.chart-card {
  background: linear-gradient(135deg, var(--surface) 0%, rgba(0,0,0,0.05) 100%);
  border: 1px solid var(--border);

  padding: 24px;
}

.chart-title {
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
  font-size: 14px;
}

.chart-subtitle {
  color: var(--text-muted);
  font-size: 12px;
  margin-bottom: 16px;
}

.chart-container {
  position: relative;
  height: 280px;
  width: 100%;
}

.data-table {
  background: linear-gradient(135deg, var(--surface) 0%, rgba(0,0,0,0.05) 100%);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  overflow-x: auto;
}

.data-table table {
  width: 100%;
  border-collapse: collapse;
}

.data-table th {
  background: rgba(196, 30, 48, 0.05);
  padding: 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;

}

.data-table td {

.data-table tr:hover {

.badge {

.badge-present {

}

.badge-absent {

  color: #f87171;
}

.badge-late {
  background: rgba(251, 191, 36, 0.15);
  color: #fbbf24;
}

.camera-btn {

  border-radius: 10px;

  letter-spacing: 0.5px;

}

.camera-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(212, 175, 55, 0.3);
}

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.modal-overlay.active {
  display: flex;
}

.modal-content {
  background: var(--surface);
  border-radius: 20px;
  padding: 30px;
  width: 90%;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
  border: 1px solid var(--border);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);

  justify-content: space-between;

  font-size: 24px;

.video-preview {

  height: 300px;
  background: #000;
  border-radius: 12px;
  margin: 20px 0;
}

.loading-text {
  text-align: center;
  color: var(--text-muted);
  padding: 40px;
}

@media (max-width: 1024px) {
  .chart-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 768px) {
  .app-layout {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    max-height: 70px;

  }

  }

  .stat-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .chart-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

// ═════════════════════════════════════════════════ CAMERA MODAL

function CameraModal({ open, onClose, onCapture }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const [hasCamera, setHasCamera] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (open) {
      setLoading(true);
      navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } 
      })
        .then(stream => {
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            setHasCamera(true);
            setLoading(false);
          }
        })
        .catch(err => {
          console.error('Camera error:', err);
          setLoading(false);
          alert('Camera access denied. Please allow camera permissions.');
        });
    } else {
      if (videoRef.current && videoRef.current.srcObject) {
        videoRef.current.srcObject.getTracks().forEach(track => track.stop());
      }
    }
  }, [open]);

  const handleCapture = () => {
    if (videoRef.current && canvasRef.current) {
      const context = canvasRef.current.getContext('2d');
      context.drawImage(videoRef.current, 0, 0, 640, 480);
      onCapture();
    }
  };

  return (
    <div className={`modal-overlay ${open ? 'active' : ''}`}>
      <div className="modal-content">
        <div className="modal-header">
          <h3 className="modal-title">📷 Camera Attendance</h3>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>

        <p style={{ color: 'var(--text-secondary)', marginBottom: 20, fontSize: 13 }}>
          Position yourself in front of the camera and click "Mark Present"
        </p>

        {loading ? (
          <div className="loading-text">🔄 Starting camera...</div>
        ) : hasCamera ? (
          <>
            <video 
              ref={videoRef} 
              className="video-preview" 
              autoPlay 
              playsInline 
              style={{width: '100%', height: 300, borderRadius: 12, background: '#000'}}
            />
            <canvas ref={canvasRef} style={{display: 'none'}} width="640" height="480"/>
            <button 
              className="camera-btn" 
              onClick={handleCapture}
              style={{width: '100%', marginBottom: 10}}
            >
              ✓ Mark Present
            </button>
          </>
        ) : (
          <div className="loading-text">❌ Camera not available</div>
        )}

        <button 
          className="action-btn" 
          onClick={onClose}
          style={{width: '100%'}}
        >
          Cancel
        </button>
      </div>
    </div>
  );
}
