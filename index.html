<style>
:root {
  --bg-dark: #0C0508;
  --bg-light: #F8F4F6;
  --surface-dark: #130810;
  --surface-light: #FFFFFF;
  --maroon: #C41E30;
  --maroon-deep: #7A0E1A;
  --gold: #D4AF37;
  --text-dark: #F2EBF0;
  --text-light: #1A0810;
  --text-muted-dark: #A89AA5;
  --text-muted-light: #6B5E68;
}

html[data-theme="dark"] {
  --bg: var(--bg-dark);
  --surface: var(--surface-dark);
  --text: var(--text-dark);
  --text-muted: var(--text-muted-dark);
  --border: rgba(255,255,255,0.07);
}

html[data-theme="light"] {
  --bg: var(--bg-light);
  --surface: var(--surface-light);
  --text: var(--text-light);
  --text-muted: var(--text-muted-light);
  --border: rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: all 300ms;
}

/* ═══════════════════════════════════════════════════════ 3D LOGO ANIMATION */

.splash-container {
  display: flex;
  height: 100vh;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0C0508 0%, #1A0C15 100%);
  flex-direction: column;
  gap: 30px;
  perspective: 1000px;
}

.logo-3d {
  width: 200px;
  height: 200px;
  position: relative;
  animation: rotate3d 8s linear infinite;
}

@keyframes rotate3d {
  0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
  100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
}

.logo-3d svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.5)) drop-shadow(0 0 40px rgba(196, 30, 48, 0.3));
}

.splash-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 52px;
  font-weight: 700;
  color: #F2EBF0;
  text-align: center;
}

.splash-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  color: #D4AF37;
}

/* ═══════════════════════════════════════════════════════ LOGIN */

.login-screen {
  display: flex;
  height: 100vh;
  background: linear-gradient(135deg, #0C0508 0%, #1A0C15 100%);
}

.login-left {

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

.logo-badge {

  height: 140px;
  margin-bottom: 40px;
  filter: drop-shadow(0 10px 30px rgba(196, 30, 48, 0.4));
}

.login-right {

  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

.login-card {

  backdrop-filter: blur(20px);
  border: 1px solid rgba(196, 30, 48, 0.3);
  border-radius: 24px;

}

.login-title {

  font-size: 32px;
  font-weight: 700;
  color: #D4AF37;
  margin-bottom: 30px;

}

.input-group {

}

.input-group label {
  display: block;
  color: #A89AA5;

  font-weight: 600;

}

.input-group input {

  border: 1px solid rgba(255, 255, 255, 0.07);

}

.input-group input:focus {

}

.login-btn {

th {

.staff-name { font-weight: 600; margin-bottom: 4px; }

.modal-overlay {

.modal-content {

.modal-close {

.camera-feed {

@media print {
  .sidebar, .topbar, .theme-toggle, .camera-btn, .print-btn {

  body { background: white; color: black; }
  .content { padding: 20px; }
  table { page-break-inside: avoid; }
  .glass-box { border: 1px solid #000; box-shadow: none; }

@media (max-width: 768px) {
  .sidebar { width: 200px; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .staff-grid { grid-template-columns: 1fr; }
  .login-screen { flex-direction: column; }
  .login-left, .login-right { flex: auto; }
}
</style>
</head>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ═════════════════════════════════════════════════ SUPABASE

const SUPABASE_URL = 'https://edboqmaywwxbnltscrso.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkYm9xbWF5d3d4Ym5sdHNjcnNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjcwMDMsImV4cCI6MjA5MjQ0MzAwM30.2U8omeYP57ENxJcg5Yg1Egt2mwIMBAgxyNnLQtLGC_o';

let supabaseClient = null;
try {
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  console.log('✅ SUPABASE CONNECTED');
} catch (e) {
  console.error('Supabase Error:', e);
}

const DataOps = {
  async getStaff() {
    if (!supabaseClient) return [];
    try {
      const { data, error } = await supabaseClient
        .from('staff')
        .select('*')
        .eq('status', 'active')
        .order('name');
      if (error) throw error;
      console.log(`✅ Loaded ${data?.length || 0} staff`);
      return data || [];
    } catch (e) {
      console.error('Staff error:', e.message);
      return [];
    }
  },

  async getAttendanceToday() {
    if (!supabaseClient) return [];
    try {
      const today = new Date().toISOString().split('T')[0];
      const { data, error } = await supabaseClient
        .from('attendance')
        .select('*')
        .eq('date', today)
        .order('in_time', { ascending: false });
      if (error) throw error;
      return data || [];
    } catch (e) {
      console.error('Attendance error:', e.message);
      return [];
    }
  },

  async getAttendanceStats() {
    if (!supabaseClient) return { total: 0, present: 0, absent: 0, late: 0 };
    try {
      const today = new Date().toISOString().split('T')[0];
      const { data, error } = await supabaseClient
        .from('attendance')
        .select('status')
        .eq('date', today);
      if (error) throw error;
      return {
        total: data.length,
        present: data.filter(d => d.status === 'present').length,
        absent: data.filter(d => d.status === 'absent').length,
        late: data.filter(d => d.status === 'late').length,
      };
    } catch (e) {
      return { total: 0, present: 0, absent: 0, late: 0 };
    }
  },

  async getLeaves() {
    if (!supabaseClient) return [];
    try {
      const { data, error } = await supabaseClient
        .from('leaves')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(20);
      if (error) throw error;
      return data || [];
    } catch (e) {
      console.error('Leaves error:', e.message);
      return [];
    }
  },

  async markAttendance(staffId, status) {
    if (!supabaseClient) return false;
    try {
      const today = new Date().toISOString().split('T')[0];
      const now = new Date().toLocaleTimeString();
      
      const { data: existing } = await supabaseClient
        .from('attendance')
        .select('id')
        .eq('staff_id', staffId)
        .eq('date', today)
        .single();

      if (existing) {
        await supabaseClient
          .from('attendance')
          .update({ status, out_time: status === 'present' ? now : null })
          .eq('staff_id', staffId)
          .eq('date', today);
      } else {
        await supabaseClient
          .from('attendance')
          .insert({
            staff_id: staffId,
            date: today,
            in_time: now,
            status
          });
      }
      return true;
    } catch (e) {
      console.error('Mark attendance error:', e.message);
      return false;
    }
  },
};

// ═════════════════════════════════════════════════ CAMERA MODAL

function CameraModal({ open, onClose, onCapture }) {
  const videoRef = useRef(null);
  const [hasCamera, setHasCamera] = useState(false);

  useEffect(() => {
    if (open) {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
        .then(stream => {
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            setHasCamera(true);
          }
        })
        .catch(err => console.error('Camera error:', err));
    } else {
      if (videoRef.current && videoRef.current.srcObject) {
        videoRef.current.srcObject.getTracks().forEach(track => track.stop());
      }
    }
  }, [open]);

  return (
    <div className={`modal-overlay ${open ? 'open' : ''}`}>
      <div className="modal-content">
        <button className="modal-close" onClick={onClose}>×</button>
        <h2 style={{ marginBottom: 20 }}>📷 Camera Attendance</h2>
        <p style={{ color: 'var(--text-muted)', marginBottom: 20 }}>
          Position your face in view and click "Mark Present"
        </p>
        {hasCamera && <video ref={videoRef} className="camera-feed" autoPlay playsInline />}
        <button className="camera-btn" style={{ width: '100%' }} onClick={() => { onCapture(); onClose(); }}>
          ✓ Mark Present
        </button>
        <button className="camera-btn" style={{ width: '100%', marginTop: 10, background: 'rgba(200,0,0,0.3)', color: 'var(--text)' }} onClick={onClose}>
          ✗ Cancel
        </button>
      </div>
    </div>
  );
}

              <div className="stat-number" style={{ color: '#f87171' }}>{stats.absent}</div>

// ═════════════════════════════════════════════════ STAFF DIRECTORY

function StaffScreen() {
  const [staff, setStaff] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');

  useEffect(() => {
    async function load() {
      const data = await DataOps.getStaff();
      setStaff(data);
      setLoading(false);
    }
    load();
  }, []);

  const filtered = staff.filter(s => 
    s.name.toLowerCase().includes(search.toLowerCase()) ||
    s.role.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <>
      <h1>Staff Directory</h1>
      <p className="section-sub">{staff.length} staff members</p>

      <input
        type="text"
        placeholder="Search staff..."
        value={search}

          width: '100%',

function App() {

  const [user, setUser] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [theme, setTheme] = useState('dark');

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);

  if (splash) return <SplashScreen onComplete={() => setSplash(false)} />;
  if (!user) return <LoginScreen onSuccess={setUser} />;

  const renderPage = () => {
    switch (page) {
      case 'dashboard': return <DashboardScreen />;

      case 'leaves': return <LeavesScreen />;
      case 'reports': return <ReportsScreen />;
      default: return <DashboardScreen />;

        <div className="content">

}

  return (

      <div className="splash-desc">Staff Attendance Management Platform</div>
    </div>
  );
}

// ═════════════════════════════════════════════════ LOGIN SCREEN

function LoginScreen({ onLoginSuccess, onError }) {
  const [email, setEmail] = useState('principal@umeededu.pk');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const validateEmail = (email) => {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return emailRegex.test(email);
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');

    // Validation
    if (!email.trim()) {
      setError('Email is required');
      return;
    }

    if (!validateEmail(email)) {
      setError('Invalid email format');
      return;
    }

    if (!password) {
      setError('Password is required');
      return;
    }

    if (password.length < 6) {
      setError('Password must be at least 6 characters');
      return;
    }

    setLoading(true);

    // Simulate API call
    setTimeout(() => {
      // HARD-CODED CREDENTIALS (For now - Phase 1)
      // Phase 2 will use real Supabase authentication
      const adminEmail = 'principal@umeededu.pk';
      const adminPassword = 'admin123';

      if (email === adminEmail && password === adminPassword) {
        console.log('✅ PHASE 1: Login Successful');
        onLoginSuccess({
          email,
          name: 'H.M. Tariq Mehmood',
          role: 'Principal - Admin',
          school: 'Umeed Education System'
        });
      } else {
        setError('Invalid email or password');
        console.log('❌ PHASE 1: Login Failed');
      }

      setLoading(false);
    }, 500);
  };

  return (
    <div className="login-container">
      <div className="login-left">
        <div className="logo-badge">
          <ProfessionalLogo />
        </div>
        <h1 className="login-title">UMEED</h1>
        <p className="login-subtitle">EDUCATION SYSTEM</p>
        <p className="login-desc">Staff Attendance & Management Platform</p>
      </div>

      <div className="login-right">
        <div className="login-card">
          <div className="card-header">
            <h2 className="card-title">Admin Portal</h2>
            <p className="card-subtitle">Sign in to your account</p>
          </div>

          {error && <div className="error-alert">{error}</div>}

          <form onSubmit={handleSubmit}>
            <div className="form-group">
              <label className="form-label">Email Address</label>
              <input
                type="email"
                className="form-input"
                placeholder="principal@umeededu.pk"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
                disabled={loading}
              />
            </div>

            <div className="form-group">
              <label className="form-label">Password</label>
              <input
                type="password"
                className="form-input"
                placeholder="••••••••"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                disabled={loading}
              />
            </div>

            <button
              type="submit"
              className="submit-btn"
              disabled={loading}
            >
              {loading ? (
                <>
                  <span className="loading-spinner" style={{marginRight: 8}}></span>
                  Signing in...
                </>
              ) : (
                'Sign In →'
              )}
            </button>
          </form>

          <div className="login-footer">
            <p>PHASE 1: Foundation</p>
            <p>Umeed Education System v2024</p>
            <p>Academic Year 2025-26</p>
          </div>
        </div>
      </div>
    </div>
  );
}
